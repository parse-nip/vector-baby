[build]
# This host has AVX-512 (see /proc/cpuinfo) but LLVM's `target-cpu=native`
# detection does NOT enable avx512 for this hypervisor's generic CPU model,
# so we enable the relevant feature flags explicitly. Without this the
# `#[cfg(target_feature = "avx512f")]` distance kernels compile out and the
# slow scalar fallback runs (~10x slower builds).
rustflags = [
    "-C", "target-cpu=native",
    "-C", "target-feature=+avx512f,+avx512bw,+avx512dq,+avx512vl,+fma,+avx2,+bmi2",
]
